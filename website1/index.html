<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Punch — Master Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Punch Master">
<script src="company-config.js"></script>
<script type="module" src="firebase-backend.js"></script>
<style>
  :root{
    --bg-1:#eef1f6; --bg-2:#e4e9f2;
    --glass:rgba(255,255,255,0.55); --glass-strong:rgba(255,255,255,0.72);
    --glass-border:rgba(255,255,255,0.9);
    --blue:#0071e3; --blue-deep:#0058b8;
    --red:#e0453b; --green:#1e8e5a;
    --text-lo:#6e7580; --text-hi:#1d1d1f;
    --shadow-soft:0 8px 30px rgba(31,41,55,0.08), 0 1px 2px rgba(31,41,55,0.06);
    --shadow-lift:0 20px 45px rgba(31,41,55,0.14), 0 2px 6px rgba(31,41,55,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1100px 600px at 12% -10%, rgba(0,113,227,0.14), transparent 60%),
      radial-gradient(900px 500px at 100% 0%, rgba(94,175,255,0.16), transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    background-attachment:fixed;
    color:var(--text-hi); font-family:'Inter',sans-serif;
    min-height:100vh; padding:32px 16px; padding-top:calc(32px + env(safe-area-inset-top));
    -webkit-font-smoothing:antialiased;
  }
  h1,h2{font-family:'Manrope',sans-serif; letter-spacing:-.01em; margin:0; color:var(--text-hi); font-weight:800;}
  h1{font-size:22px;}
  h2{font-size:15px; text-transform:uppercase; letter-spacing:.04em; font-weight:700; color:#3a3f47;}
  .wrap{max-width:900px;margin:0 auto;}
  .login-wrap{display:flex;flex-direction:column;align-items:center;gap:24px;padding-top:10vh;}
  .card{
    background:var(--glass-strong);
    -webkit-backdrop-filter:blur(28px) saturate(180%); backdrop-filter:blur(28px) saturate(180%);
    border:1px solid var(--glass-border); border-radius:20px; padding:30px; width:100%; max-width:380px;
    box-shadow:var(--shadow-lift);
  }
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-lo);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;font-weight:600;}
  input,select{
    width:100%;padding:11px 13px;border-radius:10px;border:1px solid rgba(0,0,0,0.08);
    background:rgba(255,255,255,0.8);color:var(--text-hi);font-family:'Inter',sans-serif;font-size:14px;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(0,113,227,0.15);}
  .btn{
    padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;
    letter-spacing:0;text-transform:none;font-size:14px;
    background:linear-gradient(180deg, #1a8cff, var(--blue)); color:#fff;
    box-shadow:0 1px 2px rgba(0,113,227,0.25), 0 6px 16px rgba(0,113,227,0.28);
    transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
  }
  .btn:hover{filter:brightness(1.05); transform:translateY(-1px);}
  .btn:active{transform:translateY(0); filter:brightness(0.97);}
  .btn.secondary{
    background:rgba(255,255,255,0.6); border:1px solid rgba(0,0,0,0.1); color:var(--text-hi);
    box-shadow:none; -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
  }
  .btn.secondary:hover{background:rgba(255,255,255,0.85);}
  .btn.small{font-size:12px;padding:7px 14px;}
  .error{color:var(--red);font-size:13px;margin-top:10px;font-weight:500;}
  .banner{color:var(--green);font-size:13px;margin-top:10px;font-weight:500;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.06);}
  .section{margin-bottom:28px;}
  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .panel-box{
    background:var(--glass);
    -webkit-backdrop-filter:blur(24px) saturate(180%); backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border); border-radius:18px; padding:20px;
    box-shadow:var(--shadow-soft);
  }
  .company-row{display:flex;justify-content:space-between;align-items:center;padding:13px 4px;border-bottom:1px solid rgba(0,0,0,0.06);}
  .company-row:last-child{border-bottom:none;}
  .company-row .cid{font-family:'Inter',monospace;color:var(--text-lo);font-size:12px;}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;align-items:end;}
  .form-row .field{flex:1;min-width:140px;margin-bottom:0;}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px;}
  th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-lo);padding:8px;border-bottom:1px solid rgba(0,0,0,0.08);}
  td{padding:10px 8px;border-bottom:1px solid rgba(0,0,0,0.05);font-family:'Inter',sans-serif;}
  tr:last-child td{border-bottom:none;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
function waitForFB(){
  if (window.FB) return Promise.resolve();
  return new Promise(resolve => window.addEventListener('fb-ready', resolve, { once: true }));
}
function escapeHtml(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let state = { user: null, loginError: '', banner: '', companies: {}, selectedCompany: null, roster: {} };
const app = document.getElementById('app');

function render(){
  if (!state.user) return renderLogin();
  renderDashboard();
}

function renderLogin(){
  app.innerHTML = `
    <div class="login-wrap">
      <h1>Punch — Master</h1>
      <div class="card">
        <div class="field"><label>Email</label><input id="email" type="email" placeholder="you@yourcompany.com" /></div>
        <div class="field"><label>Password</label><input id="pw" type="password" /></div>
        <button class="btn" id="loginBtn" style="width:100%;">Log in</button>
        ${state.loginError ? `<div class="error">${escapeHtml(state.loginError)}</div>` : ''}
      </div>
    </div>
  `;
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
}

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  try{
    const profile = await window.FB.login(email, pw);
    if (profile.role !== 'master'){
      await window.FB.logout();
      state.loginError = 'This account is not a master admin.';
      render();
      return;
    }
    state.user = profile;
    state.loginError = '';
    await refreshCompanies();
  }catch(e){
    console.error(e);
    state.loginError = describeAuthError(e);
    render();
  }
}

function describeAuthError(e){
  const code = e && e.code;
  if (code === 'auth/too-many-requests') return 'Too many failed attempts — Firebase has temporarily blocked further tries. Wait about 15 minutes, then try again.';
  if (code === 'auth/user-not-found' || code === 'auth/invalid-credential') return "No account found with that email — check it matches exactly what's in Firebase Console → Authentication → Users.";
  if (code === 'auth/wrong-password') return 'Incorrect password for that email.';
  if (code === 'auth/invalid-email') return "That doesn't look like a valid email address.";
  if (code === 'auth/network-request-failed') return 'Network error reaching Firebase — check your connection and try again.';
  return `Login failed${code ? ' (' + code + ')' : ''} — check the browser console for details.`;
}

async function logout(){
  await window.FB.logout();
  state.user = null;
  state.selectedCompany = null;
  render();
}

async function refreshCompanies(){
  state.companies = await window.FB.listCompanies();
  render();
}

function renderDashboard(){
  const companyRows = Object.keys(state.companies).length ? Object.keys(state.companies).map(cid => `
    <div class="company-row">
      <div>
        <div>${escapeHtml(state.companies[cid].name)}</div>
        <div class="cid">${escapeHtml(cid)}</div>
      </div>
      <button class="btn secondary small" data-viewco="${escapeHtml(cid)}">View roster</button>
    </div>
  `).join('') : `<div style="color:var(--text-lo);">No companies yet — add the first one below.</div>`;

  const rosterHtml = state.selectedCompany ? renderRosterSection() : '';

  app.innerHTML = `
    <div class="topbar">
      <h1>Punch — Master</h1>
      <button class="btn secondary small" id="logoutBtn">Log out</button>
    </div>
    ${state.banner ? `<div class="banner">${escapeHtml(state.banner)}</div>` : ''}
    ${state.loginError ? `<div class="error">${escapeHtml(state.loginError)}</div>` : ''}

    <div class="section">
      <div class="section-head"><h2>Companies</h2></div>
      <div class="panel-box">${companyRows}</div>
    </div>

    <div class="section">
      <div class="section-head"><h2>Add a company</h2></div>
      <div class="panel-box">
        <div class="form-row">
          <div class="field"><label>Company ID (used in site config)</label><input id="newCid" placeholder="e.g. acme-co" /></div>
          <div class="field"><label>Company name</label><input id="newCname" placeholder="e.g. Acme Co" /></div>
          <button class="btn" id="addCoBtn">Add company</button>
        </div>
      </div>
    </div>

    ${rosterHtml}
  `;
  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('addCoBtn').onclick = addCompany;
  document.querySelectorAll('[data-viewco]').forEach(btn => {
    btn.onclick = () => viewRoster(btn.dataset.viewco);
  });
  bindRosterHandlers();
}

async function addCompany(){
  const cid = document.getElementById('newCid').value.trim().toLowerCase().replace(/\s+/g, '-');
  const name = document.getElementById('newCname').value.trim();
  if (!cid || !name){
    state.loginError = 'Enter both a company ID and a name.';
    render();
    return;
  }
  if (state.companies[cid]){
    state.loginError = 'That company ID is already in use.';
    render();
    return;
  }
  state.loginError = '';
  try{
    await window.FB.createCompany(cid, name);
    state.banner = `Added ${name}. Now create its first admin below, and set COMPANY_ID = "${cid}" in that business's company-config.js.`;
    await refreshCompanies();
  }catch(e){
    console.error(e);
    state.loginError = "Couldn't add the company — try again.";
    render();
  }
}

async function viewRoster(cid){
  state.selectedCompany = cid;
  state.roster = await window.FB.listCompanyAccounts(cid);
  render();
}

function renderRosterSection(){
  const cid = state.selectedCompany;
  const rows = Object.keys(state.roster).length ? Object.keys(state.roster).map(uid => {
    const a = state.roster[uid];
    return `<tr><td>${escapeHtml(a.email)}</td><td>${escapeHtml(a.name)}</td><td>${escapeHtml(a.role)}</td></tr>`;
  }).join('') : `<tr><td colspan="3" style="color:var(--text-lo);font-family:'Inter',sans-serif;">No accounts yet for this company.</td></tr>`;

  return `
    <div class="section">
      <div class="section-head"><h2>Roster — ${escapeHtml(state.companies[cid] ? state.companies[cid].name : cid)}</h2></div>
      <div class="panel-box">
        <div class="form-row">
          <div class="field"><label>New admin email</label><input id="adminEmail" placeholder="e.g. owner@company.com" /></div>
          <div class="field"><label>Name</label><input id="adminName" placeholder="e.g. Jane Smith" /></div>
          <div class="field"><label>Temporary password</label><input id="adminPw" placeholder="at least 6 characters" /></div>
          <button class="btn" id="addAdminBtn">Add company admin</button>
        </div>
        <table>
          <thead><tr><th>Email</th><th>Name</th><th>Role</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}

function bindRosterHandlers(){
  const btn = document.getElementById('addAdminBtn');
  if (!btn) return;
  btn.onclick = async () => {
    const email = document.getElementById('adminEmail').value.trim().toLowerCase();
    const name = document.getElementById('adminName').value.trim();
    const pw = document.getElementById('adminPw').value;
    if (!email || !name || !pw || pw.length < 6){
      state.loginError = 'Fill in a valid email, name, and a password of at least 6 characters.';
      render();
      return;
    }
    state.loginError = '';
    try{
      await window.FB.createAccount({ email, password: pw, name, role: 'admin', companyId: state.selectedCompany });
      state.banner = `Added ${name} as an admin for this company.`;
      state.roster = await window.FB.listCompanyAccounts(state.selectedCompany);
      render();
    }catch(e){
      console.error(e);
      state.loginError = "Couldn't create that admin — the email may already be in use.";
      render();
    }
  };
}

let bootHandled = false;
async function handleInitialAuthState(user){
  if (bootHandled) return;
  bootHandled = true;
  if (user){
    try{
      const profile = await window.FB.getProfile(user.uid);
      if (profile && profile.role === 'master'){
        state.user = profile;
        await refreshCompanies();
        return;
      } else {
        await window.FB.logout();
      }
    }catch(e){ console.error(e); }
  }
  render();
}
async function boot(){
  await waitForFB();
  window.FB.onAuthChange(handleInitialAuthState);
}
boot();
</script>
</body>
</html>
